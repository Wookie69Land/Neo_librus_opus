services:
  web:
    build:
      context: .
      target: runner
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    volumes:
      - .:/app:rw
      - /app/.venv
    environment:
      - DJANGO_SETTINGS_MODULE=app.core.settings.production
      - MYSQL_DATABASE=librarius
      - MYSQL_USER=librarius_lukas
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=87.106.60.122
      - MYSQL_PORT=3306
      - ALLOWED_HOSTS=librarius-api.nanys.pl,localhost,127.0.0.1
